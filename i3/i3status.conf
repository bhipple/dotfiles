# i3status configuration.
# Replicates the compiled-in defaults, plus a volume indicator.
# The volume keybindings in i3/config send SIGUSR1 to i3status, so the
# percentage refreshes immediately on change.

general {
        colors = true
        interval = 5
        # Explicit: auto-detection fails under bin/i3status-wrapper, which
        # consumes this output to inject the mic block.
        output_format = "i3bar"
}

order += "ipv6"
order += "wireless _first_"
order += "ethernet _first_"
order += "battery all"
order += "disk /"
order += "load"
order += "memory"
order += "volume master"
order += "tztime local"

wireless _first_ {
        format_up = "W: (%quality at %essid) %ip"
        format_down = "W: down"
}

ethernet _first_ {
        format_up = "E: %ip (%speed)"
        format_down = "E: down"
}

battery all {
        format = "%status %percentage %remaining"
}

disk "/" {
        format = "💾 %avail"
}

load {
        format = "⚙ %1min"
}

memory {
        format = "🧠 %used / %available"
        threshold_degraded = "1G"
        format_degraded = "MEMORY < %available"
}

volume master {
        format = "♪ %volume"
        format_muted = "♪ muted (%volume)"
        # Track the PulseAudio/PipeWire default sink, matching the
        # pactl @DEFAULT_SINK@ keybindings.
        device = "pulse"
}

tztime local {
        format = "%Y-%m-%d %H:%M:%S"
}
